<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Generator - UI Demo</title>
    
    <!-- CheerpJ Loader -->
    <script src="https://cj3.leaningtech.com/3.0/cj3loader.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffd6e7, #fff5fa);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            color: #ff5aa0;
            margin-bottom: 5px;
        }
        p {
            color: #8c5078;
        }
        #cheerpj-container {
            width: 420px;
            height: 620px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border-radius: 30px;
            overflow: hidden;
            background: white;
            position: relative;
        }
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff5aa0;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>OTP Verification UI</h1>
        <p>Interactive Java Swing Demo running in your browser via CheerpJ.</p>
        <p style="font-size: 12px; opacity: 0.8;"><em>Note: Running in UI Mock Mode (Emails are simulated)</em></p>
    </div>

    <!-- The container where CheerpJ will render the Java UI -->
    <div id="cheerpj-container">
        <div class="loader" id="loading-text">Loading Java VM...</div>
    </div>

    <script>
        async function runJavaApp() {
            try {
                // Initialize CheerpJ in the container
                await cheerpjInit({
                    enablePreciseTime: false,
                    clipboardMode: "permission"
                });
                
                // Hide loading text once JVM is ready
                document.getElementById('loading-text').style.display = 'none';

                // Run the Main class from the JAR in the same directory, with dependencies in the classpath
                cheerpjRunMain("OTPGenerator", "/app/OTPGenerator.jar:/app/jakarta.mail-2.0.3.jar:/app/jakarta.activation-api-2.1.2.jar:/app/angus-activation-2.0.1.jar");
                
            } catch (error) {
                document.getElementById('loading-text').innerText = "Error loading app.";
                console.error("CheerpJ initialization failed:", error);
            }
        }

        // Start execution
        runJavaApp();
    </script>
</body>
</html>
